name: 'md2pdf-th Action'
description: 'Convert Markdown to PDF using md2pdf-th'
inputs:
  markdown-file:
    description: 'Path to markdown file'
    required: true
  output-file:
    description: 'Output PDF path'
    required: false
  theme:
    description: 'Theme: light or dark'
    required: false
    default: 'light'
  format:
    description: 'Page size (A4, Letter, etc.)'
    required: false
    default: 'A4'
  toc:
    description: 'Generate Table of Contents'
    required: false
    default: 'false'
  cover:
    description: 'Add cover page'
    required: false
    default: 'false'
  template:
    description: 'Built-in template (resume, report, invoice)'
    required: false
  watermark:
    description: 'Watermark text'
    required: false'
runs:
  using: 'composite'
  steps:
    - name: Install md2pdf-th
      shell: bash
      run: npm install -g md2pdf-th
    - name: Convert Markdown to PDF
      shell: bash
      run: |
        ARGS=""
        [ "${{ inputs.theme }}" != "light" ] && ARGS="$ARGS --theme ${{ inputs.theme }}"
        [ "${{ inputs.format }}" != "A4" ] && ARGS="$ARGS --format ${{ inputs.format }}"
        [ "${{ inputs.toc }}" = "true" ] && ARGS="$ARGS --toc"
        [ "${{ inputs.cover }}" = "true" ] && ARGS="$ARGS --cover"
        [ -n "${{ inputs.template }}" ] && ARGS="$ARGS --template ${{ inputs.template }}"
        [ -n "${{ inputs.watermark }}" ] && ARGS="$ARGS --watermark '${{ inputs.watermark }}'"
        if [ -n "${{ inputs.output-file }}" ]; then
          md2pdf-th $ARGS "${{ inputs.markdown-file }}" "${{ inputs.output-file }}"
        else
          md2pdf-th $ARGS "${{ inputs.markdown-file }}"
        fi
