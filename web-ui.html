<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>md2pdf-th — Web UI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:24px;margin-bottom:4px;color:#60a5fa}
p.sub{color:#94a3b8;margin-bottom:20px;font-size:14px}
.drop-zone{width:100%;max-width:600px;border:2px dashed #475569;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:border-color .2s}
.drop-zone:hover,.drop-zone.dragover{border-color:#60a5fa;background:#1e293b}
.drop-zone svg{width:48px;height:48px;fill:#60a5fa;margin-bottom:12px}
.drop-zone p{color:#94a3b8;font-size:15px}
.options{width:100%;max-width:600px;margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.options label{font-size:13px;color:#94a3b8;display:flex;flex-direction:column;gap:4px}
.options select,.options input{background:#1e293b;border:1px solid #475569;border-radius:6px;padding:6px 8px;color:#e2e8f0;font-size:13px}
.btn{margin-top:16px;background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer;transition:background .2s}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#475569;cursor:not-allowed}
.status{margin-top:12px;font-size:13px;color:#94a3b8;min-height:20px}
.status.error{color:#f87171}
.status.success{color:#4ade80}
</style>
</head>
<body>
<h1>📄 md2pdf-th</h1>
<p class="sub">Drag & drop a .md file → download PDF</p>
<div class="drop-zone" id="dropZone">
  <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
  <p>Drop .md file here or click to browse</p>
  <input type="file" id="fileInput" accept=".md" style="display:none">
</div>
<div class="options">
  <label>Theme<select id="theme"><option value="light">Light</option><option value="dark">Dark</option></select></label>
  <label>Format<select id="format"><option>A4</option><option>Letter</option><option>A3</option><option>A5</option><option>Legal</option></select></label>
  <label>Template<select id="template"><option value="">Default</option><option value="resume">Resume</option><option value="report">Report</option><option value="invoice">Invoice</option></select></label>
  <label>TOC<input type="checkbox" id="toc"></label>
</div>
<button class="btn" id="convertBtn" disabled>Convert to PDF</button>
<div class="status" id="status"></div>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),convertBtn=document.getElementById('convertBtn'),status=document.getElementById('status');
let mdContent='',fileName='';
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
function handleFile(f){if(!f||!f.name.endsWith('.md')){status.textContent='Please drop a .md file';status.className='status error';return}fileName=f.name.replace('.md','');const r=new FileReader();r.onload=e=>{mdContent=e.target.result;convertBtn.disabled=false;status.textContent=`Loaded: ${f.name} (${(f.size/1024).toFixed(1)} KB)`;status.className='status'};r.readAsText(f)}
convertBtn.addEventListener('click',async()=>{if(!mdContent)return;convertBtn.disabled=true;status.textContent='Converting...';status.className='status';try{const{md2pdfTh}=await import('./lib/md2pdf-core.js');const buf=await md2pdfTh({content:mdContent,theme:document.getElementById('theme').value,format:document.getElementById('format').value,template:document.getElementById('template').value||undefined,toc:document.getElementById('toc').checked});const blob=new Blob([buf],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fileName+'.pdf';a.click();URL.revokeObjectURL(a.href);status.textContent='✅ PDF downloaded!';status.className='status success'}catch(e){status.textContent='Error: '+e.message;status.className='status error'}finally{convertBtn.disabled=false}});
</script>
</body>
</html>
